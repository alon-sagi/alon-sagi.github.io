<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3; url=https://alonsagi.co.il" />
  <title>Redirecting to Alon Sagi Portfolio...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      background: #0d0f14;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 1.5rem;
      animation: slideDown 0.8s ease-out 0.2s both;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-title {
      color: #e0f2fe;
      font-size: clamp(16px, 5vw, 18px);
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      text-shadow: 
        0 0 20px rgba(10, 160, 240, 0.35),
        0 0 40px rgba(10, 120, 220, 0.25);
    }

    .brand-subtitle {
      color: #64748b;
      font-size: clamp(10px, 3vw, 11px);
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .progress-ring-container {
      position: relative;
      width: 64px;
      height: 64px;
      margin-bottom: 2rem;
      animation: slideUp 0.8s ease-out 0.3s both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 1.5;
    }

    .progress-ring {
      fill: none;
      stroke: rgba(0, 210, 255, 0.75);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 175.93;
      stroke-dashoffset: 175.93;
      animation: progress 2s ease-in-out forwards;
    }

    @keyframes progress {
      0% {
        stroke-dashoffset: 175.93;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      font-weight: 700;
      color: white;
      font-variant-numeric: tabular-nums;
      animation: fadeIn 0.8s ease-out 0.4s both;
    }

    .progress-bar {
      width: 160px;
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 1px;
      overflow: hidden;
      animation: expandWidth 0.6s ease-out 0.5s both;
    }

    @keyframes expandWidth {
      from {
        width: 0;
        opacity: 0;
      }
      to {
        width: 160px;
        opacity: 1;
      }
    }

    .progress-bar-fill {
      height: 100%;
      background: rgba(34, 211, 238, 0.5);
      border-radius: 1px;
      animation: fillBar 2s ease-in-out forwards;
    }

    @keyframes fillBar {
      0% {
        width: 0%;
      }
      100% {
        width: 100%;
      }
    }

    .redirect-text {
      color: #64748b;
      font-size: clamp(10px, 3vw, 13px);
      font-weight: 500;
      letter-spacing: 0.05em;
      animation: fadeIn 0.8s ease-out 0.6s both;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="header">
      <div class="brand-title">ALON SAGI</div>
      <div class="brand-subtitle">PORTFOLIO</div>
    </div>

    <div class="progress-ring-container">
      <svg viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="28" class="progress-ring-bg" />
        <circle cx="32" cy="32" r="28" class="progress-ring" />
      </svg>
      <div class="progress-text">100</div>
    </div>

    <div class="progress-bar">
      <div class="progress-bar-fill"></div>
    </div>

    <div class="redirect-text">Redirecting to alonsagi.co.il</div>
  </div>
</body>
</html>
